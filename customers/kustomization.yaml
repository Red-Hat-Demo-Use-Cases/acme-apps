apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app: acme-customers-dashboard

resources:
  - manifests/namespace.yaml
  # - manifests/pvc.yaml
  - manifests/deployment.yaml
  - manifests/config.yaml

configMapGenerator:
  - name: ressources-1
    namespace: acme-customers
    behavior: create
    files:
    - ressources/header.png
    options:
      labels:
        type: generated

replacements:
  - source:
      kind: Deployment # Kustomize propagates commonAnnotations to all resources
      name: acme-customers-dashboard
      fieldPath: metadata.annotations.[acme.com/cluster-name]
    targets:
      - select:
          kind: Deployment
          name: acme-customers-dashboard
        fieldPaths:
          - spec.template.spec.containers.[name=acme-customers-dashboard].env.[name=CLUSTER_NAME].value