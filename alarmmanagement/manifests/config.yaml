  custom.css: |-

    body {
      background: white;
      color: #333;
    }

    table {
      background: white;
      color: #333;
    }

    .jumbotron {
      color: white;
    }

    .blink {
      animation: blinker 2s linear infinite;
    }

    @keyframes blinker {
      50% {
        opacity: 0;
      }
    }

    .table-body {
      /*font-family: "Courier New";*/
      font-family: monospace;
    }

    td:nth-child(3),
    th:nth-child(3) {
      text-align: left;
    }
    td:nth-child(4),
    th:nth-child(4) {
      text-align: center;
    }
    td:nth-child(5),
    th:nth-child(5) {
      text-align: center;
    }
    td:nth-child(6),
    th:nth-child(6) {
      text-align: center;
    }
